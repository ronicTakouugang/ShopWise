name: Client tests

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client-tests.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client-tests.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production config - same one used for deployment)
        run: npx ng build --configuration production

      - name: Resolve Puppeteer's bundled Chromium path
        run: echo "CHROME_BIN=$(node -e "require('puppeteer').executablePath().then(p => console.log(p))")" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI
