<div class="history">
  <p-panel header="Recherches récentes" class="histor">
    @if (historyService.history.length){
      <div class="history-toolbar">
        <button class="clear-all" (click)="clear()">Tout effacer</button>
      </div>
    }
    <div class="history-list">
      @for (histor of historyService.history; track histor.id){
        <div class="histor--elem" (click)="articleService.search(histor.search)">
          <i class="pi pi-clock histor--icon"></i>
          <div class="histor--main">
            <span class="search-text">{{histor.search}}</span>
            <span class="search-time">{{ relativeTime(histor.id) }}</span>
          </div>
          <div class="histor--actions">
            <button
              type="button"
              class="action-btn delete-btn"
              aria-label="Supprimer cette recherche"
              title="Supprimer"
              (click)="remove(histor); $event.stopPropagation()">
              <i class="pi pi-times"></i>
            </button>
          </div>
        </div>
      } @empty {
        <div class="empty-history">
          <i class="pi pi-history"></i>
          <p>Vos recherches récentes apparaîtront ici</p>
        </div>
      }
    </div>
  </p-panel>
</div>
