<div class="search-bar" [class.disabled]="disable">
  <label for="search-product-input" class="sr-only">Rechercher des produits</label>
  <input
    id="search-product-input"
    type="text"
    class="search-input"
    autocomplete="off"
    role="combobox"
    aria-autocomplete="list"
    [attr.aria-expanded]="showSuggestions"
    aria-controls="search-suggestions-listbox"
    [attr.aria-activedescendant]="activeIndex >= 0 ? 'search-suggestion-opt-' + activeIndex : null"
    [(ngModel)]="product"
    placeholder="Rechercher des produits..."
    (ngModelChange)="onQueryChange()"
    (focus)="onQueryChange()"
    (keydown)="onKeydown($event)"
    (blur)="onBlur()"
    [disabled]="disable"
  />

  <button
    type="button"
    class="clear-icon"
    *ngIf="product"
    (click)="clearQuery()"
    aria-label="Effacer la recherche"
  >
    &times;
  </button>

  <button class="search-btn" (click)="find()" [disabled]="disable" aria-label="Rechercher">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="11" cy="11" r="7" stroke="white" stroke-width="2.5"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <ul class="suggestions-list" id="search-suggestions-listbox" role="listbox" *ngIf="showSuggestions">
    <li
      *ngFor="let s of suggestions; let i = index"
      [id]="'search-suggestion-opt-' + i"
      role="option"
      [attr.aria-selected]="i === activeIndex"
      [class.active]="i === activeIndex"
      (mousedown)="selectSuggestion(s)"
    >
      <i class="pi pi-history" aria-hidden="true"></i>
      <span>{{ s }}</span>
    </li>
  </ul>
</div>
