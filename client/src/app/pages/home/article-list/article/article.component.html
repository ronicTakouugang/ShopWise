<div
  class="card--container"
  role="link"
  tabindex="0"
  [attr.aria-label]="'Voir l\'offre pour ' + article.description + ' chez ' + article.source + ' (nouvel onglet)'"
  (click)="goToUrl()"
  (keydown.enter)="goToUrl()"
  (keydown.space)="goToUrl(); $event.preventDefault()">
  <div class="card-image-section">
    <div class="image-wrapper">
      <img [alt]="article.description" [src]="article.imageURL" class="product-image" loading="lazy" decoding="async"/>
    </div>
    <div class="promo-badge" *ngIf="article.oldPrice">
      OFFRE
    </div>
    <!-- Visibles pour tout le monde (pas juste *ngIf="authService.isAuth") : sinon les
         visiteurs non connectés ne savent même pas que favoris/alertes existent.
         Le clic reste protégé côté handler (toast + invite à se connecter). -->
    <button
      type="button"
      class="favorite-btn"
      [class.active]="isFavorite"
      [attr.aria-label]="isFavorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
      (click)="toggleFavorite($event)">
      <i class="pi" [ngClass]="isFavorite ? 'pi-heart-fill' : 'pi-heart'" aria-hidden="true"></i>
    </button>
    <button
      type="button"
      class="alert-btn"
      [class.active]="isSubscribed"
      [attr.aria-label]="isSubscribed ? 'Désactiver l\'alerte de prix' : 'Activer une alerte de prix'"
      [title]="isSubscribed ? 'Alerte de prix activée' : 'Recevoir une alerte si le prix baisse'"
      (click)="toggleSubscription($event)">
      <i class="pi" [ngClass]="isSubscribed ? 'pi-bell' : 'pi-bell-slash'" aria-hidden="true"></i>
    </button>
    <button type="button" class="history-btn" (click)="toggleHistory($event)" aria-label="Historique des prix" title="Historique des prix">
      <i class="pi pi-chart-line" aria-hidden="true"></i>
    </button>
  </div>

  <div class="card-content">
    <div class="price-history-overlay" *ngIf="showHistory" (click)="$event.stopPropagation()">
      <div class="history-header">
        <h4>Evolution du prix</h4>
        <button type="button" (click)="showHistory = false" aria-label="Fermer l'historique des prix"><i class="pi pi-times" aria-hidden="true"></i></button>
      </div>
      <div class="history-chart" *ngIf="priceHistory.length > 1">
        <p-chart type="line" [data]="chartData" [options]="chartOptions" [style]="{height: '160px'}"></p-chart>
      </div>
      <div class="history-list" *ngIf="priceHistory.length === 1">
        <div class="history-item" *ngFor="let h of priceHistory">
          <span class="history-date">{{h.date | date:'dd/MM/yy'}}</span>
          <span class="history-price">{{h.price}}€</span>
        </div>
      </div>
      <div class="history-empty" *ngIf="priceHistory.length === 0">
        Pas encore d'historique.
      </div>
    </div>
    <div class="vendor-info">
      <img [src]="article.sourceLogo" [alt]="article.source" class="vendor-logo" *ngIf="article.sourceLogo" (error)="article.sourceLogo = ''" loading="lazy" decoding="async">
      <span class="vendor-name">{{article.source}}</span>
    </div>

    <h3 class="product-title" [title]="article.description">
      {{article.description}}
    </h3>

    <div class="price-container">
      <span class="price-value">{{article.price}}</span>
      <span class="old-price" *ngIf="article.oldPrice && article.oldPrice !== 'N/A'">{{article.oldPrice}}</span>
    </div>

    <div class="alert-threshold" *ngIf="isSubscribed" (click)="$event.stopPropagation()">
      <i class="pi pi-bell" aria-hidden="true"></i>
      <select [ngModel]="thresholdPercent ?? 0" (ngModelChange)="onThresholdChange($event)" aria-label="Seuil de baisse pour déclencher l'alerte" title="Seuil de baisse pour déclencher l'alerte">
        <option [ngValue]="0">Toute baisse</option>
        <option [ngValue]="5">-5% ou plus</option>
        <option [ngValue]="10">-10% ou plus</option>
        <option [ngValue]="20">-20% ou plus</option>
        <option [ngValue]="30">-30% ou plus</option>
      </select>
    </div>

    <div class="card-footer">
      <div class="rating" *ngIf="article.rating && article.rating !== 'No Rating'">
        <span class="stars">★</span>
        <span class="rating-value">{{article.rating}}</span>
        <span class="review-count" *ngIf="article.reviewCount && article.reviewCount !== '0'">
          ({{article.reviewCount}} avis)
        </span>
      </div>
    </div>
  </div>
</div>
