<div class="card--container" (click)="goToUrl()">
  <div class="card-image-section">
    <div class="image-wrapper">
      <img [alt]="article.description" [src]="article.imageURL" class="product-image"/>
    </div>
    <div class="promo-badge" *ngIf="article.oldPrice">
      OFFRE
    </div>
    <button class="favorite-btn" [class.active]="isFavorite" (click)="toggleFavorite($event)" *ngIf="authService.isAuth">
      <i class="pi" [ngClass]="isFavorite ? 'pi-heart-fill' : 'pi-heart'"></i>
    </button>
    <div class="price-drop-badge" *ngIf="article.oldPrice && isFavorite">
      BAISSE !
    </div>
    <button class="history-btn" (click)="toggleHistory($event)" title="Historique des prix">
      <i class="pi pi-chart-line"></i>
    </button>
  </div>

  <div class="card-content">
    <div class="price-history-overlay" *ngIf="showHistory" (click)="$event.stopPropagation()">
      <div class="history-header">
        <h4>Evolution du prix</h4>
        <button (click)="showHistory = false"><i class="pi pi-times"></i></button>
      </div>
      <div class="history-chart" *ngIf="priceHistory.length > 1">
        <p-chart type="line" [data]="chartData" [options]="chartOptions" [style]="{height: '160px'}"></p-chart>
      </div>
      <div class="history-list" *ngIf="priceHistory.length === 1">
        <div class="history-item" *ngFor="let h of priceHistory">
          <span class="history-date">{{h.date | date:'dd/MM/yy'}}</span>
          <span class="history-price">{{h.price}}€</span>
        </div>
      </div>
      <div class="history-empty" *ngIf="priceHistory.length === 0">
        Pas encore d'historique.
      </div>
    </div>
    <div class="vendor-info">
      <img [src]="article.sourceLogo" [alt]="article.source" class="vendor-logo" *ngIf="article.sourceLogo" (error)="article.sourceLogo = ''">
      <span class="vendor-name">{{article.source}}</span>
    </div>

    <h3 class="product-title" [title]="article.description">
      {{article.description}}
    </h3>

    <div class="price-container">
      <span class="price-value">{{article.price}}</span>
      <span class="old-price" *ngIf="article.oldPrice && article.oldPrice !== 'N/A'">{{article.oldPrice}}</span>
    </div>

    <div class="card-footer">
      <div class="rating" *ngIf="article.rating && article.rating !== 'No Rating'">
        <span class="stars">★</span>
        <span class="rating-value">{{article.rating}}</span>
        <span class="review-count" *ngIf="article.reviewCount && article.reviewCount !== '0'">
          ({{article.reviewCount}} avis)
        </span>
      </div>
    </div>
  </div>
</div>
