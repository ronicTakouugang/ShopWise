<p-toolbar>
  <ng-template #start>
    <div class="brand-container" routerLink="/home" style="cursor: pointer; display: flex; align-items: center;">
      <h2 class="Title"><span id="shop">Shop</span>Wise</h2>
      <svg width="38" height="40" viewBox="0 0 48 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M33.1548 9.65956L23.9913 4.86169L5.54723 14.5106L0.924465 12.0851L23.9913 0L37.801 7.23403L33.1548 9.65956ZM23.9931 19.3085L42.4255 9.65955L47.0717 12.0851L23.9931 24.1595L10.1952 16.9361L14.8297 14.5106L23.9931 19.3085ZM4.6345 25.8937L0 23.4681V37.9149L23.0669 50V45.1489L4.6345 35.4894V25.8937ZM18.4324 28.2658L0 18.6169V13.7658L23.0669 25.8403V40.2977L18.4324 37.8615V28.2658ZM38.7301 23.468V18.6169L24.9205 25.8403V49.9999L29.555 47.5743V28.2659L38.7301 23.468ZM43.3546 35.4892V16.1914L48.0008 13.7659V37.9148L34.1912 45.1488V40.2977L43.3546 35.4892Z" fill="var(--p-primary-color)"/>
      </svg>
    </div>
  </ng-template>
  <ng-template #center>
  </ng-template>
  <ng-template #end>
    @if (!authSer.isAuth){
      <div class="auth-actions">
        <p-button class="auth--btn" label="Se connecter" variant="text" icon="pi pi-user" (click)="signIn()"/>
        <p-button label="S'inscrire" icon="pi pi-user-plus" (click)="signOn()"/>
      </div>
    } @else {
      <div class="user-actions">
        <!-- Notifications -->
        <div class="notification-badge-container" [class.has-unread]="unreadCount > 0" (click)="notifPanel.toggle($event)" title="Notifications">
          <i class="pi pi-bell notification-icon">
            @if (unreadCount > 0) {
              <p-badge [value]="unreadCount.toString()" severity="danger"></p-badge>
            }
          </i>
        </div>

        <p-popover #notifPanel (onShow)="markAsRead()">
          <div class="notif-panel">
            <div class="notif-panel-header">Notifications</div>
            <div class="notif-list">
              @for (n of notifications; track n.id) {
                <div class="notif-item" [class.unread]="!n.is_read" (click)="openNotification(n)">
                  <i class="pi pi-tag notif-item-icon"></i>
                  <div class="notif-item-main">
                    <span class="notif-message">{{n.message}}</span>
                    <span class="notif-date">{{ relativeTime(n.date) }}</span>
                  </div>
                </div>
              } @empty {
                <div class="notif-empty">
                  <i class="pi pi-bell"></i>
                  <p>Aucune notification pour le moment</p>
                </div>
              }
            </div>
          </div>
        </p-popover>

        <div class="user-info" (click)="menu.toggle($event)">
          <div class="text-info">
            <span class="welcome-text">Bienvenue,</span>
            <span class="user-name">{{authSer.username.split('@')[0].split('.')[0]}}</span>
          </div>
          <p-avatar
            [label]="authSer.username.charAt(0).toUpperCase()"
            shape="circle"
            styleClass="user-avatar"
            size="large">
          </p-avatar>
          <i class="pi pi-chevron-down ml-2 chevron-icon"></i>
        </div>
        <p-menu #menu [model]="userMenuItems" [popup]="true" appendTo="body" styleClass="user-popup-menu"></p-menu>
      </div>
    }
  </ng-template>
</p-toolbar>
