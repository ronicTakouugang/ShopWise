<div class="auth-card wide">
  <div class="auth-header">
    <div class="auth-logo">ShopWise</div>
    <button class="close-btn" (click)="closeModal()">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <div class="auth-body">
    <h2 class="auth-title">Inscription</h2>
    <p class="auth-subtitle">Créez votre compte pour commencer à économiser</p>

    <div class="field--content">
      @if (errorMessage) {
        <div class="p-error mb-2">{{ errorMessage }}</div>
      }

      <div class="auth-grid">
        <div class="input-wrapper">
          <i class="pi pi-user input-icon"></i>
          <input pInputText placeholder="Nom" class="auth-input"/>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-user input-icon"></i>
          <input pInputText placeholder="Prénom" class="auth-input"/>
        </div>

        <div class="input-wrapper full-width">
          <i class="pi pi-envelope input-icon"></i>
          <input pInputText placeholder="E-mail" [(ngModel)]="email" class="auth-input"/>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-key input-icon"></i>
          <p-password class="auth-password" [(ngModel)]="password" placeholder="Mot de passe" [toggleMask]="true"></p-password>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-key input-icon"></i>
          <p-password class="auth-password" placeholder="Confirmer" [toggleMask]="true" [feedback]="false"></p-password>
        </div>
      </div>

      <p-button label="Confirmer" [loading]="loading" [disabled]="!isValidEmail() || !isValidPassword()" (click)="signOn()" styleClass="auth-submit-btn"></p-button>

      <div class="auth-footer">
        <span class="compte">Déjà un compte ? <a (click)="changeFormModal()" class="auth-link">Connexion</a></span>
      </div>
    </div>
  </div>
</div>
