<div class="auth-card wide">
  <div class="auth-header">
    <div class="brand-container" style="display: flex; align-items: center; gap: 8px;">
      <div class="auth-logo"><span id="shop">shop</span>Wise</div>
      <svg width="32" height="34" viewBox="0 0 48 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M33.1548 9.65956L23.9913 4.86169L5.54723 14.5106L0.924465 12.0851L23.9913 0L37.801 7.23403L33.1548 9.65956ZM23.9931 19.3085L42.4255 9.65955L47.0717 12.0851L23.9931 24.1595L10.1952 16.9361L14.8297 14.5106L23.9931 19.3085ZM4.6345 25.8937L0 23.4681V37.9149L23.0669 50V45.1489L4.6345 35.4894V25.8937ZM18.4324 28.2658L0 18.6169V13.7658L23.0669 25.8403V40.2977L18.4324 37.8615V28.2658ZM38.7301 23.468V18.6169L24.9205 25.8403V49.9999L29.555 47.5743V28.2659L38.7301 23.468ZM43.3546 35.4892V16.1914L48.0008 13.7659V37.9148L34.1912 45.1488V40.2977L43.3546 35.4892Z" fill="#4632e2"/>
      </svg>
    </div>
    <button type="button" class="close-btn" aria-label="Fermer" (click)="closeModal()">
      <i class="pi pi-times" aria-hidden="true"></i>
    </button>
  </div>

  <div class="auth-body">
    <h2 class="auth-title">Inscription</h2>
    <p class="auth-subtitle">Créez votre compte pour commencer à économiser</p>

    <div class="field--content">
      @if (errorMessage) {
        <div class="p-error mb-2">{{ errorMessage }}</div>
      }

      <div class="auth-grid">
        <div class="input-wrapper">
          <i class="pi pi-user input-icon" aria-hidden="true"></i>
          <input pInputText placeholder="Nom" aria-label="Nom" class="auth-input"/>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-user input-icon" aria-hidden="true"></i>
          <input pInputText placeholder="Prénom" aria-label="Prénom" class="auth-input"/>
        </div>

        <div class="input-wrapper full-width">
          <i class="pi pi-envelope input-icon" aria-hidden="true"></i>
          <input pInputText placeholder="E-mail" aria-label="E-mail" [(ngModel)]="email" class="auth-input"/>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-key input-icon" aria-hidden="true"></i>
          <p-password class="auth-password" [(ngModel)]="password" placeholder="Mot de passe" ariaLabel="Mot de passe" [toggleMask]="true"></p-password>
        </div>

        <div class="input-wrapper">
          <i class="pi pi-key input-icon" aria-hidden="true"></i>
          <p-password class="auth-password" placeholder="Confirmer" ariaLabel="Confirmer le mot de passe" [toggleMask]="true" [feedback]="false"></p-password>
        </div>
      </div>

      <p-button label="Confirmer" [loading]="loading" [disabled]="!isValidEmail() || !isValidPassword()" (click)="signOn()" styleClass="auth-submit-btn"></p-button>

      <div class="auth-footer">
        <span class="compte">Déjà un compte ? <button type="button" (click)="changeFormModal()" class="auth-link">Connexion</button></span>
      </div>
    </div>
  </div>
</div>
