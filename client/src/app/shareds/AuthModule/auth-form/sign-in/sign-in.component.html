<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">ShopWise</div>
    <button class="close-btn" (click)="closeModal()">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <div class="auth-body">
    <h2 class="auth-title">Connexion</h2>
    <p class="auth-subtitle">Connectez-vous pour retrouver vos favoris</p>

    <div class="field--content">
      @if (errorMessage) {
        <div class="p-error mb-2">{{ errorMessage }}</div>
      }
      <div class="input-wrapper">
        <i class="pi pi-user input-icon"></i>
        <input pInputText placeholder="E-mail" [(ngModel)]="email" class="auth-input"/>
      </div>

      <div class="input-wrapper">
        <i class="pi pi-key input-icon"></i>
        <p-password class="auth-password" [(ngModel)]="password" placeholder="Mot de passe" [toggleMask]="true" [feedback]="false"></p-password>
      </div>

      <p-button label="Confirmer" [loading]="loading" [disabled]="!email || !password" (click)="auth()" styleClass="auth-submit-btn"></p-button>

      <div class="auth-footer">
        <span class="compte">Pas de compte ? <a (click)="changeFormModal()" class="auth-link">Créer un compte</a></span>
      </div>
    </div>
  </div>
</div>
